name: AI Review Gate

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  pull_request_review_comment:
    types:
      - created
      - edited
      - deleted
  issue_comment:
    types:
      - created
      - edited
      - deleted
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to evaluate
        required: true
        type: string

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  gate:
    if: ${{ github.event_name != 'issue_comment' || github.event.issue.pull_request != null }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout trusted base
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha || github.event.repository.default_branch }}

      - name: Evaluate AI review gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_REVIEW_TARGET_BRANCH: main
          AI_REVIEW_BOT_LOGINS: chatgpt-codex-connector[bot]
          AI_REVIEW_OVERRIDE_LABEL: ai-review-override
          AI_REVIEW_STATUS_CONTEXT: AI Review Gate / gate
        run: |
          if [ ! -f scripts/ai-review-gate.cjs ]; then
            echo "AI Review Gate script is not present on the trusted base yet; skipping."
            exit 0
          fi
          node scripts/ai-review-gate.cjs
