name: AI Review Gate

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
      - edited
  issue_comment:
    types:
      - created
      - edited
      - deleted
  workflow_run:
    workflows:
      - AI Review Gate Listener
    types:
      - completed
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to evaluate
        required: true
        type: string

permissions:
  actions: read
  contents: read
  issues: read
  pull-requests: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number || github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_sha || github.run_id }}
  cancel-in-progress: true

jobs:
  gate:
    if: ${{ (github.event_name != 'issue_comment' || github.event.issue.pull_request != null) && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout trusted base
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha || github.event.repository.default_branch }}

      - name: Download review event context
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v7
        with:
          name: ai-review-gate-event
          path: .ai-review-gate-event
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Evaluate AI review gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_REVIEW_TARGET_BRANCH: main
          AI_REVIEW_BOT_LOGINS: chatgpt-codex-connector[bot]
          AI_REVIEW_OVERRIDE_LABEL: ai-review-override
          AI_REVIEW_STATUS_CONTEXT: AI Review Gate / gate
          AI_REVIEW_RELAY_EVENT_PATH: .ai-review-gate-event/event.json
        run: |
          if [ ! -f scripts/ai-review-gate.cjs ]; then
            echo "AI Review Gate script is not present on the trusted base yet; skipping."
            exit 0
          fi
          node scripts/ai-review-gate.cjs
